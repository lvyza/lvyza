name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Generate github-contribution-grid-snake
        uses: Platane/snk@v3
        with:
          github_user_name: lvyza
          outputs: |
            dist/github-snake.svg?color_snake=%2360A5FA&color_dots=%230F172A,%231E3A8A,%232563EB,%233B82F6,%2393C5FD
            dist/github-snake-dark.svg?color_snake=%2360A5FA&color_dots=%230F172A,%231E3A8A,%232563EB,%233B82F6,%2393C5FD

      - name: Push snake to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
